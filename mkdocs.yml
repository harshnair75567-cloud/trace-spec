site_name: TRACE
site_description: Trust Runtime Attestation and Compliance Evidence — open attestation standard for agentic AI governance
site_url: https://trace.agentrust-io.com
repo_url: https://github.com/agentrust-io/trace-spec
repo_name: agentrust-io/trace-spec
edit_uri: edit/main/
docs_dir: .
copyright: "© 2026 Opaque Systems — CC BY 4.0"

exclude_docs: |
  .github/
  node_modules/
  src/
  tests/
  schema/
  LICENSE
  NOTICE
  ANTITRUST.md
  ADOPTERS.md
  MAINTAINERS.md
  SECURITY.md
  CHARTER.md
  CODE_OF_CONDUCT.md
  pyproject.toml

theme:
  name: material
  font: false
  logo: docs/assets/icon.svg
  favicon: docs/assets/icon.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            unwrap_annotated: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/agentrust-io/trace-spec
      name: trace-spec on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentrust-trace/
      name: agentrust-trace on PyPI
    - icon: fontawesome/brands/discord
      link: https://discord.gg/grgzFEHgkj
      name: Join the Discord
  generator: false
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback — open an issue to let us know.

extra_css:
  - docs/stylesheets/extra.css

nav:
  - Home: docs/index.md
  - Getting Started:
      - Quickstart: docs/quickstart.md
      - Trust Levels: docs/trust-levels.md
      - Verification: docs/verification.md
      - Schema Reference: docs/schema.md
      - Glossary: docs/glossary.md
  - Tutorials:
      - Sign your first trust record: docs/tutorials/signing-your-first-trust-record.md
      - Verify a trust record: docs/tutorials/verifying-a-trust-record.md
      - Hardware attestation platforms: docs/tutorials/hardware-attestation-platforms.md
      - Integration with cMCP: docs/tutorials/integrating-with-cmcp.md
  - Specification: spec/trace-v0.1.md
  - Integration:
      - AGT: docs/integration/agt.md
      - cMCP: docs/integration/cmcp.md
  - Platforms:
      - Overview: docs/platforms/index.md
      - AMD SEV-SNP: docs/platforms/amd-sev-snp.md
      - Intel TDX: docs/platforms/intel-tdx.md
      - NVIDIA H100: docs/platforms/nvidia-h100.md
  - Crosswalks:
      - OWASP Agentic Top 10: docs/crosswalks/owasp-agentic-top-10.md
  - Test Suite: https://tests.agentrust-io.com
  - Project:
      - Limitations: LIMITATIONS.md
      - Changelog: CHANGELOG.md
      - Contributing: CONTRIBUTING.md
      - Governance: GOVERNANCE.md
      - Roadmap: ROADMAP.md
